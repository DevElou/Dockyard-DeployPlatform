services:
  cockroach:
    image: cockroachdb/cockroach:v25.3.3
    container_name: dockyard-local-cockroach
    restart: unless-stopped
    command: start-single-node --insecure --listen-addr=0.0.0.0:26257 --http-addr=0.0.0.0:8080
    ports:
      - "26257:26257"
      - "8080:8080"
    volumes:
      - cockroach-data:/cockroach/cockroach-data

  redis:
    image: redis:7.4-alpine
    container_name: dockyard-local-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  registry:
    image: registry:2
    container_name: dockyard-local-registry
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry

volumes:
  cockroach-data:
  redis-data:
  registry-data:
