services:
  control-plane-api:
    build:
      context: ../../..
      dockerfile: build/control-plane-api.Dockerfile
    image: dockyard/control-plane-api:dev
    container_name: dockyard-control-plane-api
    restart: unless-stopped
    environment:
      DOCKYARD_API_ADDR: ":8080"
      DOCKYARD_DATABASE_URL: ${DOCKYARD_DATABASE_URL:-postgresql://root@server-1.local:26257/dockyard?sslmode=disable}
      DOCKYARD_GITHUB_TOKEN: ${DOCKYARD_GITHUB_TOKEN:?DOCKYARD_GITHUB_TOKEN is required}
    ports:
      - "8080:8080"
    networks:
      - dockyard_platform
      - dockyard_edge

  orchestrator-worker:
    build:
      context: ../../..
      dockerfile: build/orchestrator-worker.Dockerfile
    image: dockyard/orchestrator-worker:dev
    container_name: dockyard-orchestrator-worker
    restart: unless-stopped
    environment:
      DOCKYARD_DATABASE_URL: ${DOCKYARD_DATABASE_URL:-postgresql://root@server-1.local:26257/dockyard?sslmode=disable}
      DOCKYARD_GITHUB_TOKEN: ${DOCKYARD_GITHUB_TOKEN:?DOCKYARD_GITHUB_TOKEN is required}
      DOCKYARD_REGISTRY_URL: ${DOCKYARD_REGISTRY_URL:?DOCKYARD_REGISTRY_URL is required}
      DOCKYARD_AGENT_KEY: ${DOCKYARD_AGENT_KEY:-}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dockyard_platform

  web:
    build:
      context: ../../..
      dockerfile: build/web.Dockerfile
    image: dockyard/web:dev
    container_name: dockyard-web
    restart: unless-stopped
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"
    networks:
      - dockyard_platform
      - dockyard_edge

networks:
  dockyard_platform:
    external: true
  dockyard_edge:
    external: true
