services:
  control-plane-api:
    build:
      context: ../../..
      dockerfile: build/control-plane-api.Dockerfile
    image: dockyard/control-plane-api:latest
    container_name: dockyard-control-plane-api
    restart: unless-stopped
    environment:
      DOCKYARD_API_ADDR: ":8080"
      DOCKYARD_DATABASE_URL: ${DOCKYARD_DATABASE_URL:?DOCKYARD_DATABASE_URL is required}
      DOCKYARD_GITHUB_TOKEN: ${DOCKYARD_GITHUB_TOKEN:?DOCKYARD_GITHUB_TOKEN is required}
      DOCKYARD_NPM_URL: ${DOCKYARD_NPM_URL:-}
      DOCKYARD_NPM_IDENTITY: ${DOCKYARD_NPM_IDENTITY:-}
      DOCKYARD_NPM_SECRET: ${DOCKYARD_NPM_SECRET:-}
      DOCKYARD_NPM_DEFAULT_FORWARD_SCHEME: ${DOCKYARD_NPM_DEFAULT_FORWARD_SCHEME:-http}
      DOCKYARD_NPM_REQUEST_TIMEOUT: ${DOCKYARD_NPM_REQUEST_TIMEOUT:-15s}
    ports:
      - "8080:8080"
    networks:
      - dockyard_platform
      - dockyard_edge

  orchestrator-worker:
    build:
      context: ../../..
      dockerfile: build/orchestrator-worker.Dockerfile
    image: dockyard/orchestrator-worker:latest
    container_name: dockyard-orchestrator-worker
    restart: unless-stopped
    environment:
      DOCKYARD_DATABASE_URL: ${DOCKYARD_DATABASE_URL:?DOCKYARD_DATABASE_URL is required}
      DOCKYARD_GITHUB_TOKEN: ${DOCKYARD_GITHUB_TOKEN:?DOCKYARD_GITHUB_TOKEN is required}
      DOCKYARD_REGISTRY_URL: ${DOCKYARD_REGISTRY_URL:?DOCKYARD_REGISTRY_URL is required}
      DOCKYARD_AGENT_KEY: ${DOCKYARD_AGENT_KEY:?DOCKYARD_AGENT_KEY is required}
      DOCKYARD_NPM_URL: ${DOCKYARD_NPM_URL:-}
      DOCKYARD_NPM_IDENTITY: ${DOCKYARD_NPM_IDENTITY:-}
      DOCKYARD_NPM_SECRET: ${DOCKYARD_NPM_SECRET:-}
      DOCKYARD_NPM_DEFAULT_FORWARD_SCHEME: ${DOCKYARD_NPM_DEFAULT_FORWARD_SCHEME:-http}
      DOCKYARD_NPM_REQUEST_TIMEOUT: ${DOCKYARD_NPM_REQUEST_TIMEOUT:-15s}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dockyard_platform

  web:
    build:
      context: ../../..
      dockerfile: build/web.Dockerfile
      args:
        # URL de l'API vue depuis le navigateur — baked au build
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://server-1.local:8080}
    image: dockyard/web:latest
    container_name: dockyard-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    networks:
      - dockyard_platform
      - dockyard_edge

networks:
  dockyard_platform:
    external: true
  dockyard_edge:
    external: true
