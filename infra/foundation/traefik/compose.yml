services:
  traefik:
    image: traefik:v3.3
    container_name: dockyard-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ${TRAEFIK_ACME_DIR:-/opt/dockyard/traefik/acme}:/var/lib/traefik
    networks:
      - dockyard_edge

networks:
  dockyard_edge:
    external: true
